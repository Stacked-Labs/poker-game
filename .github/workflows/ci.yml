name: CI

# Runs on every PR targeting the protected branches. Once the `build` job is
# confirmed green on a real PR, mark it a required status check in the branch
# ruleset so nothing merges into dev/main without it passing.
on:
  pull_request:
    branches: [dev, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
          # Build-time placeholders. Static prerender (e.g. /cards) constructs
          # the thirdweb client, which throws if the client ID is empty. These
          # are NOT real credentials — this gate proves the app *builds*, not
          # that it reaches live services (the deploy environment supplies real
          # values). Set a repo Variable of the same name to override any of
          # these if a build ever needs a real value.
          NEXT_PUBLIC_THIRDWEB_CLIENT_ID: ${{ vars.NEXT_PUBLIC_THIRDWEB_CLIENT_ID || 'ci-build-placeholder' }}
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'https://dev-api.stackedpoker.io' }}
          NEXT_PUBLIC_WS_URL: ${{ vars.NEXT_PUBLIC_WS_URL || 'wss://dev-api.stackedpoker.io/ws' }}
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY || '1x00000000000000000000AA' }}
          NEXT_PUBLIC_POSTHOG_KEY: ${{ vars.NEXT_PUBLIC_POSTHOG_KEY || '' }}
          NEXT_PUBLIC_POSTHOG_HOST: ${{ vars.NEXT_PUBLIC_POSTHOG_HOST || 'https://eu.i.posthog.com' }}

  test:
    name: Unit & component tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        # Vitest (node + jsdom). Non-watch; exits non-zero on failure.
        run: npm test

  lint:
    name: Lint (advisory)
    runs-on: ubuntu-latest
    # Advisory for now: the repo ignores eslint during builds and carries some
    # lint debt. Once it's clean, drop continue-on-error and make this required.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        # next lint without --fix (CI must not mutate the tree)
        run: npx next lint
